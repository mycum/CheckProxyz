name: Update Proxy List

on:
  schedule:
    - cron: '0 */2 * * *' # Запуск каждые 2 часа
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run script
        run: python check.py

      - name: Push changes
        run: |
          git config --global user.name "ProxyBot"
          git config --global user.email "bot@github.com"
          git add clean_proxies.yaml
          git commit -m "Auto-update proxy list" || exit 0
          git push
